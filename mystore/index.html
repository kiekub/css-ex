<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouToys</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>

        <div class="logo">
            <span class="logo-box">▶</span>
            <h2>YouToys</h2>
        </div>

        <nav>

            <a href="">Home</a>
            <a href="">Shop</a>
            <a href="">Collections</a>
            <a href="">About</a>

        </nav>

        <button class="cart-btn">
            Cart
        </button>

    </header>

    <section class="hero">

        <div class="hero-text">

            <span class="tag">
                NEW COLLECTION
            </span>

            <h1>
                Find Your
                <span>Favorite Toy</span>
            </h1>

            <p>
                Cute figures, blind boxes and collectible toys inspired by your favorite creators.
            </p>

            <button>
                Shop Now
            </button>

        </div>

        <div class="hero-image">

            <img src="https://i.pinimg.com/1200x/a0/ba/0a/a0ba0abc24bfb7d407f827339ce4e6b6.jpg" alt="Toy">

        </div>

    </section>

    <section class="products">

        <h2>Our Toys</h2>

        <div class="product-grid">

            <div class="card">

                <img src="https://i.pinimg.com/1200x/41/97/51/419751a94ba6964f2eb9ecd2bc14c929.jpg">

                <h3>Bearly Retro Radio</h3>

                <p>฿499</p>

                <button>Add to Cart</button>

            </div>

            <div class="card">

                <img src="https://i.pinimg.com/736x/99/74/ce/9974ceb128c117285a59bb7464f6405f.jpg">

                <h3>Milk Delivery</h3>

                <p>฿199</p>

                <button>Add to Cart</button>

            </div>

            <div class="card">

                <img src="https://i.pinimg.com/736x/41/4d/b5/414db582bf3214990dd936e1b8e4c7f9.jpg">

                <h3>Fish Delivery</h3>

                <p>฿199</p>

                <button>Add to Cart</button>

            </div>

            <div class="card">

                <img src="https://i.pinimg.com/736x/eb/b9/de/ebb9de3f3aadeb619a999b91a83625d8.jpg">

                <h3>Little Aquarium</h3>

                <p>฿399</p>

                <button>Add to Cart</button>

            </div>

        </div>

    </section>

</body>
</html>
